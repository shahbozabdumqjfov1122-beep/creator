<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel — Kirish</title>
    <link rel="stylesheet" href="https://unpkg.com/@tabler/icons-webfont@latest/tabler-icons.min.css">

    <style>
        * { box-sizing: border-box; margin:0; padding:0; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: radial-gradient(circle at top, #1e293b 0%, #0f172a 60%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f8fafc;
        }

        .login-card {
            background: #1e293b;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 40px 36px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            animation: fadeUp .5s ease;
        }

        @keyframes fadeUp {
            from { opacity:0; transform: translateY(20px); }
            to { opacity:1; transform: translateY(0); }
        }

        .login-icon {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg,#3b82f6,#a855f7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin: 0 auto 20px;
        }

        .login-title {
            text-align: center;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .login-subtitle {
            text-align: center;
            font-size: 13.5px;
            color: #94a3b8;
            margin-bottom: 28px;
        }

        .form-group { margin-bottom: 18px; position: relative; }

        .form-label {
            display: block;
            font-size: 12.5px;
            color: #94a3b8;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .input-wrap { position: relative; }

        .input-wrap i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            font-size: 17px;
            z-index: 1;
        }

        .form-input {
            width: 100%;
            padding: 12px 14px 12px 44px;
            border-radius: 10px;
            border: 1px solid #334155;
            background: #0f172a;
            color: #f8fafc;
            font-size: 15px;
            outline: none;
            transition: all .2s;
        }

        .form-input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
        }

        .toggle-pass {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            cursor: pointer;
            font-size: 18px;
            background: none;
            border: none;
            padding: 0;
            z-index: 2;
        }

        .btn-login {
            width: 100%;
            padding: 13px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg,#3b82f6,#6366f1);
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all .2s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(59,130,246,0.4);
        }

        .error-box {
            background: rgba(239,68,68,0.12);
            border: 1px solid rgba(239,68,68,0.35);
            color: #ef4444;
            font-size: 13.5px;
            padding: 12px 14px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .footer-note {
            text-align: center;
            font-size: 12px;
            color: #475569;
            margin-top: 28px;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="login-icon"><i class="ti ti-shield-lock"></i></div>
    <div class="login-title">Admin Panel</div>
    <div class="login-subtitle">Tizimga kirish uchun ma'lumotlaringizni kiriting</div>

    {{if .Error}}
        <div class="error-box">
            <i class="ti ti-alert-circle"></i> {{.Error}}
        </div>
    {{end}}

    <form action="/admin/login" method="POST">
        <div class="form-group">
            <label class="form-label">Login</label>
            <div class="input-wrap">
                <i class="ti ti-user"></i>
                <input type="text" name="username" class="form-input"
                       placeholder="admin" required autofocus>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Parol</label>
            <div class="input-wrap">
                <i class="ti ti-lock"></i>
                <input type="password" id="passInput" name="password"
                       class="form-input" placeholder="••••••••" required>
                <button type="button" class="toggle-pass" onclick="togglePass()">
                    <i class="ti ti-eye" id="eyeIcon"></i>
                </button>
            </div>
        </div>

        <button type="submit" class="btn-login">
            <i class="ti ti-login"></i> Kirish
        </button>
    </form>

    <div class="footer-note">© 2026 Bot Creator — Barcha huquqlar himoyalangan</div>
</div>

<script>
    function togglePass() {
        const input = document.getElementById('passInput');
        const icon = document.getElementById('eyeIcon');

        if (input.type === 'password') {
            input.type = 'text';
            icon.className = 'ti ti-eye-off';
        } else {
            input.type = 'password';
            icon.className = 'ti ti-eye';
        }
    }
    document.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            document.querySelector('form').submit();
        }
    });
</script>

</body>
</html>
